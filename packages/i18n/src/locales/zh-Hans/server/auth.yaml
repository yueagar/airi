verifyEmail:
  title:
    pending: 请检查您的收件箱，如果没有找到，可以再检查一下 Spam（垃圾信箱）
    success: 邮箱验证成功！
    failed: Verification failed
  message:
    pending: 我们向您输入的电子邮箱发送了一个验证链接。要继续登入或注册步骤，请点开链接以继续。
